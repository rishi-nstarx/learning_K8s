apiVersion: rbac.authorization.k8s.io/v1 # be careful with the spelling of 'authorization'.
kind: RoleBinding
metadata:
  namespace: dev
  name: pod-reader
roleRef:
  kind: Role
  name:  pod-reader
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: User
    name: bob
    apiGroup: rbac.authorization.k8s.io
  - kind: ServiceAccount
    name: pod-inspector
    namespace: dev


#  whenever you change anything in role/rolebinding manifest files do "kubectl apply" for both the files/resources.