apiVersion: rbac.authorization.k8s.io/v1 # be careful with the spelling of 'authorization'.
kind: ClusterRole
metadata:
  name: pod-admin
rules:
  - apiGroups: ['']
    resources: ['pods', 'pods/log', 'pods/exec', 'pods/attach'] # don't use 'pod'.
    verbs: ['*']

# clusterrole doesn't have namespace as its scope covers entire cluster.