apiVersion: rbac.authorization.k8s.io/v1 # be careful with the spelling of 'authorization'.
kind: ClusterRoleBinding
metadata:
  name: pod-admin
roleRef:
  kind: ClusterRole
  name:  pod-admin
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: Group
    name: admin
    apiGroup: rbac.authorization.k8s.io


# clusterrolebinding doesn't have namespace as its scope covers entire cluster.
# We haven't mentioned any user here we have mentioned here group so whichever user comes under that group
# would automatically inherit all the permission through this clusterrolebinding. 