apiVersion: certificates.k8s.io/v1
kind: CertificateSigningRequest
metadata:
  name: alice
spec:
  request: 
  signerName: kubernetes.io/kube-apiserver-client
  expirationSeconds: 86400
  usages:
    - client auth

---

apiVersion: certificates.k8s.io/v1
kind: CertificateSigningRequest
metadata:
  name: bob
spec:
  request: 
  signerName: kubernetes.io/kube-apiserver-client
  expirationSeconds: 86400
  usages:
    - client auth


# always delete old 'csr' resource(kubectl get csr )before approving (kubectl certificate approve <certificate_name>)
# certificates, if you are creating new .key and .csr files to create new .crt files.

# first we create key. (openssl genrsa -out alice.key 2048)
# then we generate .csr certificates. (openssl req -new -key alice.key -out alice.csr -subj "/CN=alice/O=dev")
# then we write .yaml files like this.
# for generating base64 string from .csr files. so that we can set it as a 'request' in .yaml (cat alice.csr | base64 | tr -d "\n")
# (kubectl apply -f .)
# then approve certificates. (kubectl certificate approve alice bob)
# kubectl get csr alice -o jsonpath='{.status.certificate}' | base64 -d > alice.crt (generating the .crt)
# openssl x509 -noout -text -in 'alice.crt'
# kubectl config set-credentials alice --client-key $(realpath alice.key) --client-certificate $(realpath alice.crt)
