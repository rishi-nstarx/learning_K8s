apiVersion: v1
kind: Pod
metadata:
  name: traffic-generator
  labels:
    app: traffic-generator
spec:
  containers:
    - name: traffic-generator
      image: lmacademy/traffic-generator:1.0.0
      args:
        - 'color-api-svc.dev.svc.cluster.local/api'
        - '1'


# We can only use the name of service (color-api-svc) to access within the same namespace.
# But here we have different namespace so that we will have to use complete address (color-api-svc.dev.svc.cluster.local/api) to access the service.
