# For documentation, equivalent to the imperative command:
# kubectl run nginx-pod --image=nginx:1.27.0

apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  labels:
    app: nginx
spec:
  containers:
    - image: nginx:1.27.0
      name: nginx-container
      ports:
       - containerPort: 80


# Using '---' we seprate the resource.

---

# For documentation, equivalent to the imperative command:
# kubectl expose pod nginx-pod --type=NodePort --port=80

apiVersion: v1
kind: Service
metadata:
  name: nginx-svc
  labels:
    app: nginx
spec:
  type: NodePort
  ports:
  - port: 80
    protocol: TCP
    targetPort: 80
  selector:
    app: nginx

# Selector tells the service that which pod should be routed(USing labels with app name).
